<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族の持ち物リスト作成アプリ</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .checkbox-large { transform: scale(1.3); }
    .checked-item { text-decoration: line-through; color: #9ca3af; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

  <div class="max-w-md md:max-w-4xl mx-auto px-4 pt-6">
    <div class="flex border-b border-slate-200 mb-6 bg-slate-50 p-1.5 rounded-xl">
      <button id="tab-create" class="flex-1 py-2 px-4 rounded-lg font-bold text-sm bg-white text-indigo-600 shadow-sm transition">
        <i class="fa-solid fa-wand-magic-sparkles mr-1.5"></i>リストを作成
      </button>
      <button id="tab-view" class="flex-1 py-2 px-4 rounded-lg font-bold text-sm text-slate-500 hover:text-slate-800 transition">
        <i class="fa-solid fa-eye mr-1.5"></i>テンプレートを確認
      </button>
    </div>

    <div id="create-mode-area" class="space-y-6">
      
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <h1 class="text-xl font-bold flex items-center gap-2 text-indigo-600">
          <i class="fa-solid fa-suitcase"></i> 持ち物リスト
        </h1>
        
        <div class="mt-4">
          <div class="flex justify-between text-sm font-semibold text-slate-600 mb-1">
            <span>パッキング進捗</span>
            <span id="progress-text">0%</span>
          </div>
          <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-indigo-500 h-full w-0 transition-all duration-300"></div>
          </div>
          <div id="generated-condition-text" class="text-[11px] font-medium text-slate-400 bg-slate-50/50 rounded-lg p-2 border border-slate-100/50 hidden">
            </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <h2 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-1">
          <i class="fa-solid fa-sliders text-indigo-500"></i> リスト自動生成パネル
        </h2>
        
        <div class="space-y-2 mb-4">
          <label class="block text-xs font-bold text-slate-500">1. 必要リストにチェック（複数可）</label>
          <div id="template-options" class="grid grid-cols-2 gap-2 text-sm">
            <div class="text-slate-400 text-xs py-2">テンプレート読み込み中...</div>
          </div>
        </div>

        <div class="mb-4">
          <label for="stay-nights" class="block text-xs font-bold text-slate-500 mb-1">2. 何泊しますか？（日帰りの場合は1）</label>
          <div class="flex items-center gap-2">
            <input type="number" id="stay-nights" value="1" min="1" class="w-20 px-3 py-1.5 border border-slate-200 rounded-lg text-center font-bold text-slate-700 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <span class="text-sm font-bold text-slate-600">泊 <span class="text-xs font-normal text-slate-400">（<span id="stay-days">2</span>泊3日）</span></span>
          </div>
        </div>

        <button id="btn-generate" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-xl shadow-md transition duration-200 flex items-center justify-center gap-2 text-sm cursor-pointer">
          <i class="fa-solid fa-wand-magic-sparkles"></i> この条件でリストを作成・上書き
        </button>
      </div>

      <div id="list-container" class="space-y-6">
        <div class="text-center py-8 text-slate-400">
          <i class="fa-solid fa-circle-notch animate-spin text-2xl text-indigo-400 mb-2"></i>
          <p class="text-sm">データを読み込み中...</p>
        </div>
      </div>

    </div> 

    <div id="view-mode-area" class="hidden space-y-4">
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex items-end gap-3">
        <div class="flex-1">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">編集するテンプレートを選択</label>
          <select id="view-template-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400">
          </select>
        </div>
        <button id="btn-add-category" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold p-3 rounded-xl transition text-sm cursor-pointer" title="新規カテゴリ(人)を追加">
          <i class="fa-solid fa-user-plus"></i>
        </button>
      </div>

      <div id="view-template-content" class="space-y-4"></div>

      <div class="pt-2">
        <button id="btn-save-template" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-200 flex items-center justify-center gap-2 text-sm cursor-pointer">
          <i class="fa-solid fa-floppy-disk"></i> テンプレートの変更をすべて保存
        </button>
      </div>
    </div>

    
  </div>

  <script src="app.js"></script>
</body>
</html>
